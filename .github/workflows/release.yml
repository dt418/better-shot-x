name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64: native build on standard ubuntu runner.
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: amd64
          # aarch64: native build on the official ARM runner (free for public repos).
          # Cross-compiling glib-sys for aarch64 from x86_64 is fragile and unnecessary
          # now that GitHub provides free ARM runners for public repositories.
          - platform: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libavutil-dev libavformat-dev libavcodec-dev \
            libavfilter-dev libavdevice-dev libswscale-dev libswresample-dev \
            libleptonica-dev libtesseract-dev libclang-dev clang \
            pkg-config build-essential patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'target -> .git/ci-target-cache'

      - uses: pnpm/action-setup@v4
        # pnpm version is pinned via `packageManager` in package.json —
        # do not also pass `version:` here or the action refuses to run.

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Better Shot X ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
