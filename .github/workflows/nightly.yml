name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  matrix:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: Ubuntu 24.04 LTS
          - os: ubuntu-22.04
            label: Ubuntu 22.04 LTS
          - os: ubuntu-20.04
            label: Ubuntu 20.04 LTS
          - os: fedora-40
            label: Fedora 40
          - os: fedora-39
            label: Fedora 39
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Debian/Ubuntu)
        if: runner.os == 'Linux' && contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libavutil-dev libavformat-dev libavcodec-dev \
            libavfilter-dev libavdevice-dev libswscale-dev libswresample-dev \
            libleptonica-dev libtesseract-dev libclang-dev clang \
            pkg-config build-essential patchelf

      - name: Install system dependencies (Fedora)
        if: runner.os == 'Linux' && contains(matrix.os, 'fedora')
        run: |
          sudo dnf install -y \
            webkit2gtk4.1-devel gtk3-devel libappindicator-gtk3-devel \
            librsvg2-devel ffmpeg-free-devel tesseract-devel leptonica-devel \
            clang-devel pkg-config patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test
        run: cargo test --workspace --no-fail-fast
